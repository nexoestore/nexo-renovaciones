name: Nexo Renovaciones APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Localizar y descomprimir ZIP
        shell: bash
        run: |
          echo "Archivos encontrados en el repositorio:"
          find . -maxdepth 2 -type f -print

          ZIP_FILE="$(find . -maxdepth 2 -type f -iname '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No hay ningún archivo ZIP en el repositorio."
            exit 1
          fi

          echo "ZIP encontrado: $ZIP_FILE"

          mkdir -p proyecto
          unzip -o "$ZIP_FILE" -d proyecto

          echo "Contenido descomprimido:"
          find proyecto -maxdepth 4 -type f -print

      - name: Detectar carpeta del proyecto Android
        shell: bash
        run: |
          PROJECT_DIR="$(dirname "$(find proyecto -type f \( -name 'settings.gradle.kts' -o -name 'settings.gradle' \) | head -n 1)")"

          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            echo "ERROR: No se encontró settings.gradle.kts ni settings.gradle."
            exit 1
          fi

          echo "Proyecto Android encontrado en: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Compilar APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: Localizar APK
        shell: bash
        run: |
          APK_FILE="$(find "$PROJECT_DIR" -type f -name '*debug*.apk' | head -n 1)"

          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No se encontró el APK generado."
            exit 1
          fi

          echo "APK encontrado: $APK_FILE"
          echo "APK_FILE=$APK_FILE" >> "$GITHUB_ENV"

      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: NexoRenovaciones-debug-apk
          path: ${{ env.APK_FILE }}
          if-no-files-found: error
