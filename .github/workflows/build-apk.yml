name: Construir Nexo Renovaciones APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto
        run: |
          mkdir proyecto
          unzip -o NexoRenovaciones_v1_GitHub_corregido.zip -d proyecto
          ls -la proyecto

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Compilar APK
        working-directory: proyecto
        run: gradle :app:assembleDebug --stacktrace

      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: NexoRenovaciones-debug-apk
          path: proyecto/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
